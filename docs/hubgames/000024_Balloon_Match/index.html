<!DOCTYPE html>

<html lang="en-us">

<head>
		<title>Balloon Match</title>
	<meta charset="utf-8" />
	<meta name="renderer" content="webkit" />
	<meta name="viewport"
		content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="full-screen" content="true" />
	<meta name="x5-fullscreen" content="true" />
	<meta name="360-fullscreen" content="true" />
	<meta name="laya" screenorientation="landscape" />
	<meta http-equiv="expires" content="0" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<meta http-equiv="expires" content="0" />
	<meta http-equiv="Cache-Control" content="no-siteapp" />
	<style>
		* {
			-webkit-touch-callout: none;
			-webkit-user-select: none;
			-khtml-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
			user-select: none;
		}
	</style>
	<script src="./platform.js"></script>
	<script src="./games/sdk/v2.js"></script>
</head>

<body>
	<script>
		var lostUrl = [],
			repUrl = [];
		var isDraft = location.href.indexOf("draft=true") > 0;
		let userAgent = window.navigator.userAgent.toLowerCase();
		window.isPhone = 0 <= userAgent.indexOf("android") || 0 <= userAgent.indexOf("iphone");
		if (!isDraft) {
			console.error = console.log = console.info = console.warn = function () {};
		}
		console.warn = function () {};
		window.onResizeUpdateFunction = {};
		if (!window.isPhone) {
			window.onresize = function () {
				for (const key in window.onResizeUpdateFunction) {
					if (window.onResizeUpdateFunction[key]) {
						window.onResizeUpdateFunction[key]();
					}
				}
			}
		}

		function loadLib(url) {
			var script = document.createElement("script");
			script.async = false;
			script.src = url;
			document.body.appendChild(script);
		}
	</script>
	<script type="text/javascript" src="index.js"></script>
</body>

</html>
