<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="viewport-fit=cover,width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,shrink-to-fit=no,user-scalable=no" />
    <title>Archery Master Pro</title>
    <style>
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }

        html {
            width: 100%;
            height: 100%;
            font-size: 18px;
            scroll-behavior: smooth;
            font-family: Segoe UI Historic, Segoe UI, Helvetica, Arial, sans-serif;
            background-color: #191919;
        }

        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            color: white;
            background: transparent;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100%;
            position: absolute;
            /* background-image: url(./assets/svgs/background.svg); */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
        }

        canvas {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            position: relative;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
            box-shadow: rgb(0 0 0 / 10%) 0px 0px 16px 16px;
        }

        #capture {
            display: none;
        }

        #lds-dual-ring {
            display: block;
            width: 64px;
            height: 64px;
            margin: 0px auto;
            border-radius: 50%;
            border: 6px solid #fff;
            border-color: #fff transparent #fff transparent;
            animation: lds-dual-ring 1.2s linear infinite;
            -webkit-animation: lds-dual-ring 1.2s linear infinite;
        }

        #lds-text {
            text-align: center;
            -webkit-text-align: center;
            margin-top: 30px;
            font-size: 1.2rem;
        }

        #lds-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            -webkit-transform: translate(-50%, -50%);
        }

        @keyframes lds-dual-ring {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        div[hidden] {
            display: none !important;
        }
    </style>
    <script src="glutil/ad.js"></script>

        }
        gtag('js', new Date());
        gtag('config', 'G-JTQ5M79TS6');

    <script src="libs/sentry.min.js"></script>
    <script>
        "use strict"

        var waitSentryTimer = setInterval(function () {
          
            var dns = ""

</head>

<body>

    <div id="lds-content" hidden>
        <div id="lds-dual-ring"></div>
        <div id="lds-text">

    <script>
        "use strict";
        var div_app = document.getElementById('app');
        div_app.style.height = (document.documentElement.clientHeight - 50) + 'px';
        function initFbInstant() {
            var t = 1;
            FBInstant.initializeAsync().then((function () {
                window.focus();
                var n = FBInstant.player.getID();
                FBInstant.getEntryPointAsync().then((function (t) {
                    initGoogleAnalytics(n, t)
                }
                )).catch((function () {
                    initGoogleAnalytics(n, "no_entry")
                }
                )),
                    window.__fbInstantInitiated = !0,
                    window.__fbInstantLoadingTimer = setInterval((function () {
                        FBInstant.setLoadingProgress(t++),
                            t >= 30 && clearInterval(window.__fbInstantLoadingTimer)
                    }
                    ), 80)
            }
            ))
        }
        function initGoogleAnalytics(t, n) {
            window.__GA_CONFIG.GAME_NAME;
            var i = window.__GA_CONFIG.BUILD_VERSION
                , a = window.__GA_CONFIG.GA_MEASUREMENT_ID;
            if ("null" != a) {
                var e = FBInstant.getEntryPointData() || {}
                    , s = e.fbig_ad_id
                    , o = e.fbig_adset_id
                    , _ = e.fbig_campaign_id
                    , g = document.createElement("script");
                g.async = !0,
                    g.src = "",
                    document.head.appendChild(g),
                    gtag("set", "client_storage", "none"),
                    gtag("set", "client_id", "100." + t),
                    gtag("set", "user_id", t),
                    gtag("set", "send_page_view", !1),
                    gtag("js", new Date),
                    gtag("config", a, {
                        cookie_flags: "SameSite=None;Secure",
                        build: i,
                        medium: n,
                        campaign: _,
                        groups: "GA"
                    }),
                    gtag("set", "user_properties", {
                        user_id: t,
                        traffic_source: n,
                        campaign_id: _,
                        adset_id: o,
                        ad_id: s
                    }),
                    gtag("event", "app_launch", {
                        send_to: "GA"
                    }),
                    window.__analyticsInitiated = !0
            } else
                window.__analyticsInitiated = !0
        }
        initFbInstant();
    </script>
