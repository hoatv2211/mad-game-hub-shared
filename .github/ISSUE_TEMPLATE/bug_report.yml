name: Bug report
description: Report a reproducible problem in showcase pages, metadata, or links
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide clear repro steps so we can investigate quickly.
        This repository is showcase-only; source projects are hosted externally.
  - type: input
    id: sample_name
    attributes:
      label: Sample name
      description: Example: Share002_PixelShooter3D
      placeholder: ShareNNN_GameName
    validations:
      required: true
  - type: input
    id: showcase_page
    attributes:
      label: Showcase page
      placeholder: docs/Share002_PixelShooter3D.html
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps from opening the showcase page or link to seeing the issue.
      placeholder: |
        1. Open docs page
        2. Click source or demo link
        3. Observe issue
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: Repro frequency
      options:
        - Always
        - Often
        - Sometimes
        - Rarely
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or error messages
      description: Paste relevant Console stack traces.
      render: shell
  - type: textarea
    id: media
    attributes:
      label: Screenshots or video links
      description: Optional, but very helpful for gameplay bugs.
